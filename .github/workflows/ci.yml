name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/validate-docs.py
      - run: python scripts/test_webhook_receiver_verification.py
      - run: python scripts/test_validate_service_contracts.py
      - run: python scripts/validate-service-contracts.py
      - run: python scripts/test_validate_release_evidence.py
      - run: python scripts/validate-release-evidence.py
      - run: python scripts/test_security_baseline_scan.py
      - run: python scripts/security-baseline-scan.py

  go-service:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: modern_pki_test
          POSTGRES_USER: modern_pki
          POSTGRES_PASSWORD: modern_pki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modern_pki -d modern_pki_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: |
            service/go.mod
            service/go.sum
      - run: go test ./...
      - run: go vet ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go test -p 1 ./internal/store ./internal/httpapi -run PostgresIntegration -v
        env:
          MODERN_PKI_POSTGRES_TEST_DSN: postgres://modern_pki:modern_pki@localhost:5432/modern_pki_test?sslmode=disable
      - run: go build ./cmd/modern-pki-service

  cpp-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build --config Debug
      - run: ctest --test-dir build -C Debug --output-on-failure
